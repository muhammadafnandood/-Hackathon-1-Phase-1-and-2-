<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=interactive-textbook.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Physical AI Textbook...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .redirect-message {
            text-align: center;
        }
        .redirect-message h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .redirect-message p {
            font-size: 16px;
            opacity: 0.9;
        }
        .spinner {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="redirect-message">
        <h1>🤖 Physical AI Textbook</h1>
        <p>Redirecting to interactive textbook...</p>
        <div class="spinner"></div>
        <p>If you are not redirected, <a href="interactive-textbook.html" style="color: white; text-decoration: underline;">click here</a></p>
    </div>
</body>
</html>

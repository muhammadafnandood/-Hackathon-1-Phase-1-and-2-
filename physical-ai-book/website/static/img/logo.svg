<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Robot Head -->
  <rect x="25" y="20" width="50" height="40" rx="5" fill="#8B7060"/>
  
  <!-- Eyes -->
  <circle cx="40" cy="35" r="5" fill="#F9F7F2"/>
  <circle cx="60" cy="35" r="5" fill="#F9F7F2"/>
  
  <!-- Antenna -->
  <line x1="50" y1="20" x2="50" y2="10" stroke="#8B7060" stroke-width="3"/>
  <circle cx="50" cy="8" r="4" fill="#A69080"/>
  
  <!-- Body -->
  <rect x="30" y="65" width="40" height="25" rx="3" fill="#6F5545"/>
  
  <!-- Arms -->
  <line x1="30" y1="75" x2="15" y2="85" stroke="#6F5545" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="75" x2="85" y2="85" stroke="#6F5545" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="50" y="115" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5A4535" text-anchor="middle">
    Physical AI
  </text>
</svg>

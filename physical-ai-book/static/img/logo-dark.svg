<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Robot Head Outline -->
  <circle cx="100" cy="80" r="50" fill="none" stroke="url(#robotGradient)" stroke-width="4"/>
  
  <!-- Robot Eyes -->
  <circle cx="80" cy="70" r="8" fill="url(#aiGradient)"/>
  <circle cx="120" cy="70" r="8" fill="url(#aiGradient)"/>
  
  <!-- Robot Mouth -->
  <rect x="75" y="95" width="50" height="8" rx="4" fill="url(#robotGradient)"/>
  
  <!-- Robot Antenna -->
  <line x1="100" y1="30" x2="100" y2="15" stroke="url(#robotGradient)" stroke-width="3"/>
  <circle cx="100" cy="10" r="6" fill="url(#aiGradient)"/>
  
  <!-- AI Brain Circuit Lines -->
  <path d="M 50 80 Q 30 80 30 100 Q 30 120 50 120" fill="none" stroke="url(#aiGradient)" stroke-width="2" opacity="0.6"/>
  <path d="M 150 80 Q 170 80 170 100 Q 170 120 150 120" fill="none" stroke="url(#aiGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Circuit Nodes -->
  <circle cx="30" cy="100" r="4" fill="url(#aiGradient)"/>
  <circle cx="170" cy="100" r="4" fill="url(#aiGradient)"/>
  <circle cx="50" cy="120" r="4" fill="url(#aiGradient)"/>
  <circle cx="150" cy="120" r="4" fill="url(#aiGradient)"/>
  
  <!-- Text -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#robotGradient)" text-anchor="middle">PHYSICAL AI</text>
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Humanoid Robotics</text>
</svg>
